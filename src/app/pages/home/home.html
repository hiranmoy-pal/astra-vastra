<app-header></app-header>

<main class="home">

  <!-- HERO -->
  <section class="hero">
    <div class="container hero__content">

      <div class="hero__text">
        <p class="hero__tag">CURATED COLLECTION 2024</p>

        <h1 class="hero__title">
          The Art of <br />
          <span class="gradient-text">Fluidity.</span>
        </h1>

        <p class="hero__desc">
          Experience a digital marketplace where luxury meets enterprise reliability.
          Curated for the modern professional.
        </p>

        <div class="hero__actions">
          <a routerLink=""><button class="btn primary"> Shop Collections</button></a>
          <a routerLink="/"><button class="btn link">
              View Lookbook <i class="fa fa-arrow-right"></i>
            </button></a>
        </div>
      </div>

      <div class="hero__image">
        <div class="image-card">
          <img
            src="https://rukminim2.flixcart.com/image/612/612/xif0q/sari/s/y/w/free-tiranga9601-smc-sareemall-unstitched-original-imah8eqbkzewzq6z.jpeg?q=70"
            alt="Hero" />

          <div class="image-card__info">
            <p class="tag">New Arrival</p>
            <p class="title">Linear Sculpture Dress</p>
          </div>
        </div>
      </div>

    </div>
  </section>

  <!-- Banner Section -->
  <section class="banner">
    <div class="container">
      <swiper-container #swiperRefBanner class="banner__swiper" init="false">
        <swiper-slide *ngFor="let img of banners">
          <img [src]="img" class="banner-img" />
        </swiper-slide>
      </swiper-container>
    </div>
  </section>
